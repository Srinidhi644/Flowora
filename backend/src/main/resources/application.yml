server:
  port: 8080

spring:
  application:
    name: flowora

  # Default profile uses H2 (in-memory) so you can run instantly
  # Switch to 'mysql' profile for production: --spring.profiles.active=mysql
  datasource:
    url: jdbc:h2:file:./data/flowora;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

# JWT config
app:
  jwt:
    secret: flowora-secret-key-change-this-in-production-min-256-bits-long-key
    expiration-ms: 86400000  # 24 hours

---
# MySQL profile
spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    url: jdbc:mysql://localhost:3306/flowora?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

---
# Production profile (uses env vars)
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/flowora;AUTO_SERVER=TRUE}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update

app:
  jwt:
    secret: ${JWT_SECRET:flowora-secret-key-change-this-in-production-min-256-bits-long-key}
    expiration-ms: ${JWT_EXPIRATION:86400000}
